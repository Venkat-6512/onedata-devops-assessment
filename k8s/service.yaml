apiVersion: v1
kind: Service
metadata:
  name: onedata-api-svc
  namespace: staging
  labels:
    app: onedata-api
spec:
  type: NodePort
  selector:
    app: onedata-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
