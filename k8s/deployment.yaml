apiVersion: apps/v1
kind: Deployment
metadata:
  name: onedata-api
  namespace: staging
  labels:
    app: onedata-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onedata-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: onedata-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: onedata-api
          image: ghcr.io/GITHUB_USERNAME/onedata-devops-api:IMAGE_TAG
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
