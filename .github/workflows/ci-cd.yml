name: CI/CD Pipeline — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: onedata-devops-api
  K8S_NAMESPACE: staging

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push to GHCR
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      full_image: ${{ steps.vars.outputs.full_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image vars (GHCR requires lowercase owner)
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Building: ${FULL_IMAGE}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.vars.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker image summary
        run: |
          echo "## Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.vars.outputs.full_image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA tag:** ${{ steps.vars.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Staging
  # Spins up Minikube ON the runner itself
  # Manual approval gate via GitHub Environment
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://localhost:30080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Start Minikube directly on the runner ──
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: 'latest'
          driver: docker
          kubernetes-version: 'v1.28.0'

      - name: Verify Minikube is running
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Log in to GHCR so Minikube can pull the image ──
      - name: Configure GHCR image pull secret
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Create namespace first
          kubectl get namespace ${{ env.K8S_NAMESPACE }} \
            || kubectl create namespace ${{ env.K8S_NAMESPACE }}

          # Create imagePullSecret so Minikube can pull from GHCR
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Patch deployment manifest with real image + pull secret ──
      - name: Update manifest with image and pull secret
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${{ needs.docker-build.outputs.short_sha }}"

          sed -i "s|GITHUB_USERNAME|${OWNER_LC}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${SHORT_SHA}|g" k8s/deployment.yaml

          # Inject imagePullSecrets into the deployment
          sed -i '/restartPolicy: Always/i\      imagePullSecrets:\n        - name: ghcr-secret' k8s/deployment.yaml

          echo "Deploying: ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          cat k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/onedata-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s

      - name: Verify deployment
        run: |
          echo "## ✅ Deployment Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=onedata-api -o wide | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get services -n ${{ env.K8S_NAMESPACE }} | tee -a $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — rolling back..."
          kubectl rollout undo deployment/onedata-api -n ${{ env.K8S_NAMESPACE }} || true
          echo "Rollback attempted."

  # ─────────────────────────────────────────────
  # JOB 5: Integration Tests
  # ─────────────────────────────────────────────
  integration-test:
    name: 🔬 Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Spin up fresh Minikube again for integration tests
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: 'latest'
          driver: docker
          kubernetes-version: 'v1.28.0'

      - name: Configure GHCR pull secret
        run: |
          kubectl get namespace ${{ env.K8S_NAMESPACE }} \
            || kubectl create namespace ${{ env.K8S_NAMESPACE }}

          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Re-deploy for integration tests
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${{ needs.docker-build.outputs.short_sha }}"
          sed -i "s|GITHUB_USERNAME|${OWNER_LC}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${SHORT_SHA}|g" k8s/deployment.yaml
          sed -i '/restartPolicy: Always/i\      imagePullSecrets:\n        - name: ghcr-secret' k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/onedata-api \
            -n ${{ env.K8S_NAMESPACE }} --timeout=180s

      - name: Wait for pods ready
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app=onedata-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Run smoke tests via curl
        run: |
          SVC_IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          SVC_URL="http://${SVC_IP}:30080"
          echo "Testing service at $SVC_URL"

          echo "--- Health Check ---"
          curl -sf "$SVC_URL/health" | jq .

          echo "--- Create Item ---"
          ITEM=$(curl -sf -X POST "$SVC_URL/items" \
            -H "Content-Type: application/json" \
            -d '{"name":"smoke-test-item"}')
          echo "$ITEM" | jq .
          ITEM_ID=$(echo "$ITEM" | jq -r '.id')

          echo "--- Get Item ---"
          curl -sf "$SVC_URL/items/$ITEM_ID" | jq .

          echo "--- Delete Item ---"
          curl -sf -X DELETE "$SVC_URL/items/$ITEM_ID"

          echo "✅ All smoke tests passed!"
