name: CI/CD Pipeline — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/onedata-devops-api
  K8S_NAMESPACE: staging

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Checkout & Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies (including devDeps)
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Push to GHCR
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker image summary
        run: |
          echo "## Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag (commit SHA):** ${{ steps.vars.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Minikube (staging)
  # Requires manual approval via GitHub Environment
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # This environment has a manual approval gate configured in GitHub Settings
    environment:
      name: staging
      url: http://localhost:30080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        # KUBE_CONFIG secret contains base64-encoded kubeconfig for Minikube/kind
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          kubectl cluster-info

      - name: Create namespace if not exists
        run: |
          kubectl apply -f k8s/service.yaml --dry-run=client
          kubectl get namespace ${{ env.K8S_NAMESPACE }} \
            || kubectl create namespace ${{ env.K8S_NAMESPACE }}

      - name: Update image tag in manifest
        env:
          SHORT_SHA: ${{ needs.docker-build.outputs.short_sha }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          sed -i "s|GITHUB_USERNAME|${GITHUB_USERNAME}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${SHORT_SHA}|g" k8s/deployment.yaml
          echo "Deploying image: ghcr.io/${GITHUB_USERNAME}/onedata-devops-api:${SHORT_SHA}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/onedata-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "## Deployment Status ✅" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} \
            -l app=onedata-api \
            -o wide | tee -a $GITHUB_STEP_SUMMARY
          kubectl get services -n ${{ env.K8S_NAMESPACE }} \
            | tee -a $GITHUB_STEP_SUMMARY

      # Rollback on failure (bonus requirement)
      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — rolling back..."
          kubectl rollout undo deployment/onedata-api \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/onedata-api \
            -n ${{ env.K8S_NAMESPACE }} --timeout=60s
          echo "Rollback complete."

  # ─────────────────────────────────────────────
  # JOB 5: Integration Tests (Bonus — parallel)
  # Runs after deploy, tests live service
  # ─────────────────────────────────────────────
  integration-test:
    name: 🔬 Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Wait for service to be ready
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app=onedata-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=90s

      - name: Run smoke tests via curl
        run: |
          SVC_URL="http://$(minikube ip 2>/dev/null || echo 'localhost'):30080"
          echo "Testing service at $SVC_URL"

          # Health check
          echo "--- Health Check ---"
          curl -sf "$SVC_URL/health" | jq .

          # Create item
          echo "--- Create Item ---"
          ITEM=$(curl -sf -X POST "$SVC_URL/items" \
            -H "Content-Type: application/json" \
            -d '{"name":"smoke-test-item"}')
          echo "$ITEM" | jq .
          ITEM_ID=$(echo "$ITEM" | jq -r '.id')

          # Get item
          echo "--- Get Item ---"
          curl -sf "$SVC_URL/items/$ITEM_ID" | jq .

          # Delete item
          echo "--- Delete Item ---"
          curl -sf -X DELETE "$SVC_URL/items/$ITEM_ID"

          echo "✅ All smoke tests passed!"
